<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport"
       content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                user-scalable=no, viewport-fit=cover">
 <meta name="apple-mobile-web-app-capable"            content="yes">
 <meta name="apple-mobile-web-app-status-bar-style"   content="black-translucent">
 <meta name="apple-mobile-web-app-title"              content="Dotir">
 <meta name="theme-color"                             content="#7C3AED">
 <title>Dotir 2</title>

 <link rel="manifest"         href="manifest.json">
 <link rel="apple-touch-icon" href="assets/img/icon-192.png">
 <link rel="icon" type="image/png" href="assets/img/icon-192.png">

 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="stylesheet"
       href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap">

 <style>
   :root {
     --d-bg:         #0f0824;
     --d-surface:    #FFFFFF;
     --d-text:       #2D1B4E;
     --d-muted:      #9B7EC8;
     --d-primary:    #A855F7;
     --d-primary-dk: #7C3AED;
     --d-nav-bg:     linear-gradient(135deg,#7C3AED 0%,#C026D3 60%,#EC4899 100%);
     --d-nav-h:      56px;
     --r-sm:   12px;
     --r-md:   18px;
     --r-lg:   24px;
     --r-xl:   32px;
     --s-card: 0 4px 20px rgba(168,85,247,0.14);
     --s-deep: 0 8px 32px rgba(124,58,237,0.22);
     --safe-top:    env(safe-area-inset-top, 0px);
     --safe-bottom: env(safe-area-inset-bottom, 0px);
   }

   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

   html, body {
     height: 100%; width: 100%; overflow: hidden;
     font-family: 'Nunito', system-ui, sans-serif;
     background: #0f0824;
     color: var(--d-text);
     -webkit-tap-highlight-color: transparent;
     user-select: none;
   }

   #app {
     position: fixed; inset: 0;
     padding-top: var(--safe-top);
     padding-bottom: 0;
     display: flex; flex-direction: column;
     background: #0f0824;
   }

   #app-aurora {
  position: fixed; inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
#app-aurora::before {
  content: '';
  position: absolute; border-radius: 50%;
  filter: blur(50px); opacity: 0.85;
  width: 85vw; height: 85vw;
  top: -25vw; left: -15vw;
  background: radial-gradient(circle at 40% 40%, #9333EA, #06B6D4, transparent 68%);
  animation: aurora-a 7s ease-in-out infinite alternate;
  will-change: transform;
}
#app-aurora::after {
  content: '';
  position: absolute; border-radius: 50%;
  filter: blur(50px); opacity: 0.85;
  width: 75vw; height: 75vw;
  bottom: -15vw; right: -10vw;
  background: radial-gradient(circle at 60% 60%, #D946EF, #10B981, transparent 68%);
  animation: aurora-b 9s ease-in-out infinite alternate;
  will-change: transform;
}
.aurora-blob {
  position: absolute; border-radius: 50%;
  pointer-events: none;
  will-change: transform;
}
.aurora-blob:nth-child(1) {
  width: 65vw; height: 65vw;
  top: 20%; left: 22%;
  filter: blur(45px); opacity: 0.75;
  background: radial-gradient(circle at 50% 50%, #2DD4BF, #7C3AED, transparent 68%);
  animation: aurora-c 11s ease-in-out infinite alternate;
}
.aurora-blob:nth-child(2) {
  width: 50vw; height: 50vw;
  top: 48%; left: 8%;
  filter: blur(45px); opacity: 0.70;
  background: radial-gradient(circle at 50% 50%, #F472B6, #6366F1, transparent 68%);
  animation: aurora-d 6s ease-in-out infinite alternate;
}
@keyframes aurora-a {
  0%   { transform: translate(0,0) scale(1) rotate(0deg); }
  33%  { transform: translate(8vw,6vh) scale(1.08) rotate(2deg); }
  66%  { transform: translate(12vw,10vh) scale(1.14) rotate(-1deg); }
  100% { transform: translate(16vw,13vh) scale(1.2) rotate(3deg); }
}
@keyframes aurora-b {
  0%   { transform: translate(0,0) scale(1.1) rotate(0deg); }
  33%  { transform: translate(-5vw,-4vh) scale(1.05) rotate(-2deg); }
  66%  { transform: translate(-9vw,-7vh) scale(0.96) rotate(1deg); }
  100% { transform: translate(-13vw,-11vh) scale(0.9) rotate(-3deg); }
}
@keyframes aurora-c {
  0%   { transform: translate(0,0) scale(0.9); }
  50%  { transform: translate(-6vw,9vh) scale(1.05); }
  100% { transform: translate(-11vw,16vh) scale(1.18); }
}
@keyframes aurora-d {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(7vw,-5vh) scale(1.07); }
  100% { transform: translate(13vw,-9vh) scale(1.13); }
}

   #app-header {
     flex-shrink: 0;
     height: var(--d-nav-h);
     display: flex; align-items: center;
     padding: 0 12px; gap: 8px;
     background: var(--d-nav-bg);
     border-radius: 0 0 20px 20px;
     box-shadow: 0 4px 20px rgba(124,58,237,0.28);
     position: relative; z-index: 20;
   }

   #header-izq {
     display: flex; align-items: center; gap: 8px;
     flex-shrink: 0;
   }

   .menu-logo { display: flex; align-items: baseline; gap: 6px; }
   .menu-logo h1 {
     font-size: 1.45rem; font-weight: 900;
     letter-spacing: -0.5px; color: #fff;
   }
   .menu-logo .version {
     font-size: 0.6rem; font-weight: 700;
     color: rgba(255,255,255,.4);
     text-transform: uppercase; letter-spacing: .1em;
   }

   #btn-volver {
     display: none;
     align-items: center; justify-content: center;
     width: 36px; height: 36px; flex-shrink: 0;
     border-radius: var(--r-md); border: none;
     background: rgba(255,255,255,0.18);
     color: white; font-size: 1.1rem;
     cursor: pointer;
     transition: background 0.15s, transform 0.12s;
   }
   #btn-volver:active { background: rgba(255,255,255,0.32); transform: scale(0.90); }
   #btn-volver.visible { display: flex; }

   #header-centro {
     display: flex; align-items: center;
     margin-left: auto;
   }

   #indicador-offline {
     display: flex; align-items: center; gap: 5px;
     padding: 4px 10px; border-radius: 20px;
     font-size: 0.68rem; font-weight: 700;
     border: 1.5px solid; transition: all 0.3s ease;
   }
   #indicador-offline.online   { background:#dcfce7; border-color:#86efac; color:#166534; }
   #indicador-offline.offline  { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
   #indicador-offline.checking { background:#fef9c3; border-color:#fde047; color:#713f12; }
   #dot-conexion {
     width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
   }
   .online  #dot-conexion  { background: #22c55e; }
   .offline #dot-conexion  { background: #ef4444; }
   .checking #dot-conexion { background: #eab308; }

   #modulo-acciones {
     display: flex; align-items: center; gap: 6px;
     flex-shrink: 0;
   }

   #app-body {
     flex: 1; min-height: 0;
     position: relative; z-index: 1;
   }

   #vista-menu {
     position: absolute; inset: 0;
     display: flex; flex-direction: column;
     overflow: hidden;
     background: transparent;
   }

   #menu-grid {
  flex: 1; overflow: hidden;
  padding: 12px 20px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 8px;
  position: relative; z-index: 1;
  background: transparent;
}

   .module-tile {
     background: transparent;
     border: none;
     box-shadow: none;
     padding: 8px;
     display: flex; flex-direction: column;
     align-items: center; justify-content: center;
     gap: 10px;
     cursor: pointer; position: relative;
     transition: transform 0.15s ease;
     min-height: 0;
   }
   .module-tile:active { transform: scale(0.90); }

   .tile-img {
  width: 85%;
  height: auto;
  max-height: none;
  object-fit: contain;
  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.5));
  transition: filter 0.15s ease;
}
   .module-tile:active .tile-img {
     filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
   }

   .tile-label {
     font-size: 1rem; font-weight: 900;
     text-align: center; color: white;
     text-shadow: 0 2px 8px rgba(0,0,0,0.7);
     line-height: 1.2; flex-shrink: 0;
   }

   .d-nav-btn {
     display: flex; align-items: center; justify-content: center;
     height: 32px; padding: 0 13px; border-radius: var(--r-md);
     border: none; background: rgba(255,255,255,0.18);
     color: white; font-size: 0.8rem; font-weight: 800;
     cursor: pointer; gap: 5px; white-space: nowrap;
     transition: background 0.15s, transform 0.12s;
   }
   .d-nav-btn:active { background: rgba(255,255,255,0.32); transform: scale(0.93); }
   .d-nav-btn.activo { background: rgba(255,255,255,0.28); }

   .d-lang-btn {
     display: flex; align-items: center; justify-content: center;
     width: 32px; height: 32px; border-radius: var(--r-sm);
     border: 2px solid rgba(255,255,255,0.25);
     background: rgba(255,255,255,0.12);
     color: white; font-size: 1rem;
     cursor: pointer; transition: all 0.15s;
   }
   .d-lang-btn.activo { border-color: white; background: rgba(255,255,255,0.28); }

   #modal-pin {
     position: fixed; inset: 0;
     background: rgba(124,58,237,0.45);
     display: none; align-items: center; justify-content: center;
     z-index: 9000; backdrop-filter: blur(8px);
   }
   #modal-pin.visible { display: flex; }

   .pin-box {
     background: white; border-radius: var(--r-xl);
     padding: 32px; width: 88%; max-width: 340px;
     text-align: center; box-shadow: var(--s-deep);
     border: 3px solid rgba(168,85,247,0.2);
   }
   .pin-box h3 {
     font-size: 1.3rem; font-weight: 900;
     margin-bottom: 8px; color: #2D1B4E;
   }
   .pin-box p {
     font-size: 1rem; color: #2D1B4E;
     margin-bottom: 16px; font-weight: 800;
   }
   #input-pin {
     width: 100%; padding: 16px;
     text-align: center; font-size: 2.6rem; font-weight: 900;
     border: 3px solid rgba(168,85,247,0.25); border-radius: var(--r-md);
     outline: none; margin-bottom: 14px; color: #2D1B4E;
     font-family: inherit;
   }
   #input-pin:focus { border-color: var(--d-primary); }
   .pin-btns { display: flex; gap: 10px; }
   .pin-btns button {
     flex: 1; padding: 15px; border-radius: var(--r-md);
     border: none; font-weight: 900; font-size: 1.1rem;
     cursor: pointer; font-family: inherit;
   }
   #btn-pin-ok     { background: var(--d-primary); color: white; }
   #btn-pin-cancel { background: #F3EEFF; color: #2D1B4E; }
   #pin-error {
     color: #C2185B; font-size: 0.95rem;
     font-weight: 800; margin-top: 8px; min-height: 1em;
   }
 </style>
</head>
<body>

<script>
window.addEventListener('error', e => {
 document.body.innerHTML +=
   '<pre style="background:red;color:white;padding:10px;font-size:12px;position:fixed;top:0;left:0;right:0;z-index:99999;overflow:auto;">ERROR: ' + e.message + '\n' + e.filename + '\nLinea: ' + e.lineno + '</pre>';
});
window.addEventListener('unhandledrejection', e => {
 document.body.innerHTML +=
   '<pre style="background:orange;color:black;padding:10px;font-size:12px;position:fixed;top:0;left:0;right:0;z-index:99999;overflow:auto;">PROMISE: ' + e.reason + '</pre>';
});
</script>

<div id="app">

 <div id="app-aurora">
   <div class="aurora-blob"></div>
   <div class="aurora-blob"></div>
 </div>

 <header id="app-header">
   <div id="header-izq">
     <button id="btn-volver" aria-label="Volver al menu">&#127968;</button>
     <div class="menu-logo" id="header-logo">
       <h1>Dotir</h1>
       <span class="version">v2.0</span>
     </div>
   </div>
   <div id="header-centro">
     <div id="indicador-offline" class="checking">
       <span id="dot-conexion"></span>
       <span id="texto-conexion">Verificando...</span>
     </div>
   </div>
   <div id="modulo-acciones"></div>
 </header>

 <div id="app-body">
   <div id="vista-menu">
     <nav id="menu-grid" aria-label="Modulos de la aplicacion"></nav>
   </div>
 </div>

</div>

<div id="modal-pin" role="dialog" aria-modal="true">
 <div class="pin-box">
   <h3>Acceso Protegido</h3>
   <p id="pin-hint"></p>
   <input type="number" id="input-pin" placeholder="..."
          inputmode="numeric" autocomplete="off">
   <div class="pin-btns">
     <button id="btn-pin-cancel">Cancelar</button>
     <button id="btn-pin-ok">Entrar</button>
   </div>
   <p id="pin-error" role="alert"></p>
 </div>
</div>

<script type="module">
import { registrarSW, onConexionChange } from './core/offline.js';
import { toast, animarEntrada          } from './core/ui.js';
import AudioManager                      from './core/audio.js';
import SaacModule                        from './modules/saac/module.js';
import MemoramaModule                    from './modules/memorama/module.js';
import MusicaModule                      from './modules/musica/module.js';
import AjustesModule                     from './modules/ajustes/module.js';
import LibrosModule                      from './modules/libros/module.js';
import VideosModule                      from './modules/videos/module.js';

const $ = id => document.getElementById(id);

registrarSW();

onConexionChange(estado => {
 $('indicador-offline').className = estado;
 $('texto-conexion').textContent = {
   online: 'En linea', offline: 'Sin conexion', checking: 'Verificando...'
 }[estado];
});

const MODULE_REGISTRY = [
 SaacModule,
 MemoramaModule,
 MusicaModule,
 AjustesModule,
 LibrosModule,
 VideosModule,
].filter(m => m.habilitado).sort((a, b) => a.orden - b.orden);

const UI_IMGS = {
 saac:     'assets/ui/btn-comunicador.png',
 memorama: 'assets/ui/btn-memorama.png',
 musica:   'assets/ui/btn-musica.png',
 libros:   'assets/ui/btn-libros.png',
 videos:   'assets/ui/btn-videos.png',
 ajustes:  'assets/ui/btn-ajustes.png',
};

MODULE_REGISTRY.forEach(mod => {
 const tile = document.createElement('button');
 tile.className = 'module-tile';
 tile.setAttribute('aria-label', mod.label);
 tile.dataset.id = mod.id;

 const imgSrc = UI_IMGS[mod.id];
 tile.innerHTML =
   (imgSrc
     ? '<img class="tile-img" src="' + imgSrc + '" alt="' + mod.label + '">'
     : '<span style="font-size:4rem">' + mod.emoji + '</span>') +
   '<span class="tile-label">' + mod.label + '</span>';

 tile.addEventListener('click', () =>
   mod.requierePin ? abrirPin(mod) : navegarA(mod)
 );
 $('menu-grid').appendChild(tile);
});

let _moduloActivo      = null;
const _modulosPausados = {};
const _contenedores    = {};

function _getContenedor(id) {
 if (!_contenedores[id]) {
   const div = document.createElement('div');
   div.dataset.modulo = id;
   div.style.cssText =
     'position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;';
   $('app-body').appendChild(div);
   _contenedores[id] = div;
 }
 return _contenedores[id];
}

function _modoMenu() {
 $('btn-volver').classList.remove('visible');
 $('header-logo').style.display = '';
 $('modulo-acciones').innerHTML = '';
}

function _modoModulo() {
 $('btn-volver').classList.add('visible');
 $('header-logo').style.display = 'none';
}

async function navegarA(mod) {
 $('vista-menu').style.display = 'none';
 _modoModulo();

 if (_moduloActivo && _moduloActivo.id !== mod.id) {
   try { _moduloActivo.onLeave?.(); } catch (_) {}
   if (_moduloActivo.pause) {
     try { _moduloActivo.pause(); } catch (_) {}
     _getContenedor(_moduloActivo.id).style.display = 'none';
     _modulosPausados[_moduloActivo.id] = _moduloActivo;
   } else {
     try { _moduloActivo.destroy?.(); } catch (_) {}
     const c = _contenedores[_moduloActivo.id];
     if (c) { c.innerHTML = ''; c.style.display = 'none'; }
   }
   _moduloActivo = null;
 }

 const contenedor = _getContenedor(mod.id);

 if (_modulosPausados[mod.id] && mod.resume) {
   _moduloActivo = mod;
   contenedor.style.display = 'flex';
   $('modulo-acciones').innerHTML = '';
   try {
     await mod.resume(contenedor);
     mod.onEnter?.();
     animarEntrada(contenedor);
   } catch (e) {
     console.error('[App] Error al resumir ' + mod.id, e);
   }
   return;
 }

 if (_modulosPausados[mod.id] && !mod.resume) {
   try { _modulosPausados[mod.id].destroy?.(); } catch (_) {}
   delete _modulosPausados[mod.id];
   contenedor.innerHTML = '';
 }

 _moduloActivo = mod;
 contenedor.innerHTML = '';
 contenedor.style.display = 'flex';
 $('modulo-acciones').innerHTML = '';

 try {
   await mod.init(contenedor);
   mod.onEnter?.();
   animarEntrada(contenedor);
 } catch (e) {
   console.error('[App] Error en modulo ' + mod.id, e);
   contenedor.innerHTML =
     '<div style="padding:2rem;color:#ef4444;font-weight:600;">Error al cargar el modulo.</div>';
 }
}

function volverAlMenu() {
 if (_moduloActivo) {
   try { _moduloActivo.onLeave?.(); } catch (_) {}
   const contenedor = _getContenedor(_moduloActivo.id);
   if (_moduloActivo.pause) {
     try { _moduloActivo.pause(); } catch (_) {}
     contenedor.style.display = 'none';
     _modulosPausados[_moduloActivo.id] = _moduloActivo;
   } else {
     try { _moduloActivo.destroy?.(); } catch (_) {}
     contenedor.innerHTML = '';
     contenedor.style.display = 'none';
   }
   _moduloActivo = null;
 }
 $('vista-menu').style.display = '';
 _modoMenu();
}

$('btn-volver').addEventListener('click', volverAlMenu);

let _pinTarget = null, _pinRespuesta = 0;

function abrirPin(mod) {
 _pinTarget = mod;
 const a = Math.floor(Math.random() * 9) + 1;
 const b = Math.floor(Math.random() * 9) + 1;
 _pinRespuesta = a + b;
 $('pin-hint').textContent  = 'Resuelve: ' + a + ' + ' + b + ' = ?';
 $('input-pin').value       = '';
 $('pin-error').textContent = '';
 $('modal-pin').classList.add('visible');
 setTimeout(() => $('input-pin').focus(), 100);
}

function cerrarPin() {
 $('modal-pin').classList.remove('visible');
 _pinTarget = null;
}

$('btn-pin-ok').addEventListener('click', () => {
 if (parseInt($('input-pin').value, 10) === _pinRespuesta) {
   const mod = _pinTarget;
   cerrarPin();
   navegarA(mod);
 } else {
   $('pin-error').textContent = 'Respuesta incorrecta, intenta de nuevo.';
   $('input-pin').value = '';
   $('input-pin').focus();
 }
});
$('btn-pin-cancel').addEventListener('click', cerrarPin);
$('input-pin').addEventListener('keydown', e => {
 if (e.key === 'Enter') $('btn-pin-ok').click();
});
$('modal-pin').addEventListener('click', e => {
 if (e.target === $('modal-pin')) cerrarPin();
});

const moduloUrl = new URLSearchParams(location.search).get('modulo');
if (moduloUrl) {
 const mod = MODULE_REGISTRY.find(m => m.id === moduloUrl);
 if (mod) navegarA(mod);
}

window.DotirApp = { volverAlMenu, navegarA, toast, MODULE_REGISTRY };
AudioManager.montarBtnGlobal();
</script>
</body>
</html>
