<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable"            content="yes">
  <meta name="apple-mobile-web-app-status-bar-style"   content="black-translucent">
  <meta name="apple-mobile-web-app-title"              content="Dótir">
  <meta name="theme-color"                             content="#1A1A2E">
  <title>Dótir 2</title>

  <link id="manifest-link"  rel="manifest"         href="manifest.json">
  <link id="apple-icon"     rel="apple-touch-icon" href="assets/img/icon-192.png">
  <link id="favicon"        rel="icon" type="image/png" href="assets/img/icon-192.png">

  <style>
    /* ══════════════════════════════════════════════
       DESIGN SYSTEM — tokens globales
       Paleta oscura consistente con el Memorama,
       neutra para no competir con los pictogramas SAAC.
       ══════════════════════════════════════════════ */
    :root {
      /* ── Paleta alegre para niña de 3 años ──────────────────
         Inspirada en DJ Emmy (violeta-rosa-índigo) pero
         llevada a tonos más suaves, saturados y amigables.
         Fondo cálido en lugar de azul frío.              */

      /* Fondo del menú — amarillo muy suave, como papel de color */
      --d-bg:          #FFF8F0;
      --d-surface:     #FFFFFF;
      --d-text:        #2D1B4E;   /* púrpura oscuro, más cálido que negro */
      --d-muted:       #9B7EC8;
      --d-border:      rgba(155,126,200,0.15);

      /* Acento principal — violeta medio (herencia DJ Emmy) */
      --d-primary:     #A855F7;
      --d-primary-dk:  #7C3AED;

      /* Navbar — gradiente violeta→rosa como DJ Emmy, más suave */
      --d-nav-bg:      linear-gradient(135deg, #7C3AED 0%, #C026D3 60%, #EC4899 100%);
      --d-nav-h:       48px;      /* un poco más alta = más fácil de tocar */
      --d-nav-text:    rgba(255,255,255,0.70);
      --d-nav-icon:    #FFFFFF;

      /* Categorías SAAC — más saturadas y alegres */
      --cat-social:    #FFD6E7;  --cat-social-t:    #9D174D;
      --cat-emociones: #FDE68A;  --cat-emociones-t: #92400E;
      --cat-medical:   #FCA5A5;  --cat-medical-t:   #7F1D1D;
      --cat-action:    #A7F3D0;  --cat-action-t:    #064E3B;
      --cat-place:     #BAE6FD;  --cat-place-t:     #0C4A6E;
      --cat-noun:      #DDD6FE;  --cat-noun-t:      #3B0764;
      --cat-juego:     #FBCFE8;  --cat-juego-t:     #831843;
      --cat-favs:      #FEF08A;  --cat-favs-t:      #713F12;

      /* Radios — más redondeados = más amigable */
      --r-sm:   12px;
      --r-md:   18px;
      --r-lg:   24px;
      --r-xl:   32px;

      /* Sombras — más coloridas, menos grises */
      --s-card: 0 4px 20px rgba(168,85,247,0.14);
      --s-deep: 0 8px 32px rgba(124,58,237,0.22);

      /* Safe areas */
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      /* Fuente redondeada y amigable — igual que DJ Emmy usa system-ui */
      font-family: 'Nunito', 'Varela Round', system-ui, sans-serif;
      background: var(--d-bg);
      color: var(--d-text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Importar Nunito desde Google Fonts (redondeada, muy legible para niñas) */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

    #app {
      position: fixed; inset: 0;
      padding-top: var(--safe-top);
      display: flex; flex-direction: column;
    }

    /* ══════════════════════════════════════════════
       VISTA MENÚ
       ══════════════════════════════════════════════ */
    #vista-menu {
      display: flex; flex-direction: column;
      height: 100%; width: 100%;
    }

    #menu-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      background: var(--d-nav-bg);
      flex-shrink: 0;
      /* Borde inferior redondeado — toque amigable */
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.25);
    }

    .menu-logo { display: flex; align-items: baseline; gap: 7px; }
    .menu-logo h1 {
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: -0.5px; color: #fff;
    }
    .menu-logo .version {
      font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,.35);
      text-transform: uppercase; letter-spacing: .1em;
    }

    /* Indicador de conexión */
    #indicador-offline {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; border: 1.5px solid;
      transition: all 0.3s ease;
    }
    #indicador-offline.online   { background:#dcfce7; border-color:#86efac; color:#166534; }
    #indicador-offline.offline  { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
    #indicador-offline.checking { background:#fef9c3; border-color:#fde047; color:#713f12; }
    #dot-conexion {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      transition: background 0.3s;
    }
    .online  #dot-conexion  { background: #22c55e; }
    .offline #dot-conexion  { background: #ef4444; }
    .checking #dot-conexion { background: #eab308; }

    /* Grid de tiles */
    #menu-grid {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 20px;
      padding-bottom: calc(20px + var(--safe-bottom));
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .module-tile {
      background: var(--d-surface);
      border-radius: var(--r-lg);
      box-shadow: var(--s-card);
      padding: 26px 14px 20px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      cursor: pointer; position: relative;
      border: 2.5px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .module-tile:active { transform: scale(0.95); box-shadow: none; }
    .module-tile .tile-emoji  { font-size: 3rem; line-height: 1; }
    .module-tile .tile-label  {
      font-size: 0.88rem; font-weight: 800;
      text-align: center; color: var(--d-text); line-height: 1.2;
    }
    .module-tile .tile-desc   {
      font-size: 0.72rem; color: var(--d-muted);
      text-align: center; font-weight: 500;
    }
    .module-tile[data-requiere-pin]::after {
      content: '🔒'; font-size: 0.7rem;
      position: absolute; top: 10px; right: 12px;
    }

    /* ══════════════════════════════════════════════
       VISTA MÓDULO
       Estructura:
         #vista-modulo
           ├── #modulo-nav   ← barra fija compartida (44px)
           └── #modulo-contenido ← 100% del resto
       ══════════════════════════════════════════════ */
    #vista-modulo {
      display: none;
      position: fixed; inset: 0;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      flex-direction: column;
      z-index: 10;
    }
    #vista-modulo.activa { display: flex; }

    /* Barra de navegación del módulo */
    #modulo-nav {
      display: flex; align-items: center;
      height: var(--d-nav-h);
      flex-shrink: 0;
      background: var(--d-nav-bg);
      padding: 0 10px;
      gap: 8px;
      border-radius: 0 0 16px 16px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.22);
    }

    #btn-volver {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: var(--r-md);
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
    }
    #btn-volver:active { background: rgba(255,255,255,0.32); transform: scale(0.90); }

    #modulo-acciones {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }

    /* Estilo base para botones de acción que los módulos inyecten en #modulo-acciones */
    /* Los módulos pueden usar la clase .d-nav-btn para mantener consistencia */
    :root {
      --d-nav-btn-bg:      rgba(255,255,255,0.10);
      --d-nav-btn-bg-act:  rgba(255,255,255,0.22);
    }

    /* Contenedor del módulo — ocupa todo el espacio restante */
    #modulo-contenido {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════
       MODAL PIN
       ══════════════════════════════════════════════ */
    #modal-pin {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 9000; backdrop-filter: blur(6px);
    }
    #modal-pin.visible { display: flex; }

    .pin-box {
      background: white; border-radius: var(--r-xl);
      padding: 28px; width: 88%; max-width: 340px;
      text-align: center; box-shadow: var(--s-deep);
    }
    .pin-box h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; }
    .pin-box p  { font-size: 0.8rem; color: var(--d-muted); margin-bottom: 16px; }

    #input-pin {
      width: 100%; padding: 14px;
      text-align: center; font-size: 1.6rem; font-weight: 700;
      border: 2px solid #e2e8f0; border-radius: var(--r-md);
      outline: none; margin-bottom: 14px;
    }
    #input-pin:focus { border-color: var(--d-primary); }

    .pin-btns { display: flex; gap: 10px; }
    .pin-btns button {
      flex: 1; padding: 12px; border-radius: var(--r-sm);
      border: none; font-weight: 700; font-size: 0.9rem; cursor: pointer;
    }
    #btn-pin-ok     { background: var(--d-primary); color: white; }
    #btn-pin-cancel { background: var(--d-bg); color: var(--d-text); }
    #pin-error {
      color: #ef4444; font-size: 0.78rem;
      font-weight: 600; margin-top: 8px; min-height: 1em;
    }

    /* ══════════════════════════════════════════════
       UTILIDADES COMPARTIDAS
       Clases disponibles para los módulos
       ══════════════════════════════════════════════ */

    /* Botón de acción en la navbar — para que los módulos mantengan consistencia */
    .d-nav-btn {
      display: flex; align-items: center; justify-content: center;
      height: 32px; padding: 0 12px; border-radius: var(--r-sm);
      border: none; background: rgba(255,255,255,0.10);
      color: white; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; gap: 5px; white-space: nowrap;
      transition: background 0.15s, transform 0.12s;
    }
    .d-nav-btn:active { background: rgba(255,255,255,0.22); transform: scale(0.94); }
    .d-nav-btn.activo { background: rgba(255,255,255,0.22); }

    /* Chip de idioma */
    .d-lang-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: var(--r-sm);
      border: 2px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white; font-size: 1rem;
      cursor: pointer; transition: all 0.15s;
    }
    .d-lang-btn.activo { border-color: white; background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>

<div id="app">

  <!-- ══ VISTA MENÚ ══════════════════════════════ -->
  <div id="vista-menu">

    <header id="menu-header">
      <div class="menu-logo">
        <h1>Dótir</h1>
        <span class="version">v2.0</span>
      </div>
      <div id="indicador-offline" class="checking">
        <span id="dot-conexion"></span>
        <span id="texto-conexion">Verificando…</span>
      </div>
    </header>

    <nav id="menu-grid" aria-label="Módulos de la aplicación"></nav>

  </div>

  <!-- ══ VISTA MÓDULO ════════════════════════════ -->
  <div id="vista-modulo">

    <!-- Barra de navegación compartida -->
    <div id="modulo-nav">
      <button id="btn-volver" aria-label="Volver al menú">🏠</button>
      <!-- Los módulos pueden inyectar controles en #modulo-acciones -->
      <div id="modulo-acciones"></div>
    </div>

    <!-- Contenido del módulo activo -->
    <main id="modulo-contenido" aria-live="polite"></main>

  </div>

</div>

<!-- ══ MODAL PIN ════════════════════════════════ -->
<div id="modal-pin" role="dialog" aria-modal="true">
  <div class="pin-box">
    <h3>Acceso Protegido</h3>
    <p id="pin-hint"></p>
    <input type="number" id="input-pin" placeholder="···"
           inputmode="numeric" autocomplete="off">
    <div class="pin-btns">
      <button id="btn-pin-cancel">Cancelar</button>
      <button id="btn-pin-ok">Entrar</button>
    </div>
    <p id="pin-error" role="alert"></p>
  </div>
</div>

<!-- ══ LÓGICA ═══════════════════════════════════ -->
<script type="module">
import { registrarSW, onConexionChange } from './core/offline.js';
import { toast, animarEntrada          } from './core/ui.js';

const $ = id => document.getElementById(id);

/* 1. Service Worker */
registrarSW();

/* 2. Indicador de conexión */
onConexionChange(estado => {
  $('indicador-offline').className = estado;
  $('texto-conexion').textContent = {
    online: 'En línea', offline: 'Sin conexión', checking: 'Verificando…'
  }[estado];
});

/* ══════════════════════════════════════════════
   3. MODULE REGISTRY
   REGLA:
   · Módulo listo     → import real + entrada sin comentar
   · Módulo pendiente → import comentado + placeholder
   ══════════════════════════════════════════════ */
import SaacModule     from './modules/saac/module.js';
import MemoramaModule from './modules/memorama/module.js';
// import MusicaModule  from './modules/musica/module.js';
// import LibrosModule  from './modules/libros/module.js';
// import VideosModule  from './modules/videos/module.js';

const _ph = nombre =>
  `<div style="display:flex;align-items:center;justify-content:center;
    height:100%;background:#1a1a2e;color:rgba(255,255,255,.3);
    font-size:1rem;font-weight:600;">
    Módulo ${nombre} en construcción…
  </div>`;

const MODULE_REGISTRY = [

  SaacModule,
  MemoramaModule,

  // MusicaModule,
  { id:'musica',  label:'Música',  emoji:'🎵', desc:'Reproductor',       color:'#F5A623', orden:3,  habilitado:true, requierePin:false, init:async c=>{c.innerHTML=_ph('Música')},   destroy:()=>{}, onEnter:()=>{}, onLeave:()=>{}, cache:[] },
  // LibrosModule,
  { id:'libros',  label:'Libros',  emoji:'📚', desc:'Visor PDF',          color:'#10B981', orden:4,  habilitado:true, requierePin:false, init:async c=>{c.innerHTML=_ph('Libros')},   destroy:()=>{}, onEnter:()=>{}, onLeave:()=>{}, cache:[] },
  // VideosModule,
  { id:'videos',  label:'Videos',  emoji:'🎬', desc:'Reproductor video',  color:'#EF4444', orden:5,  habilitado:true, requierePin:false, init:async c=>{c.innerHTML=_ph('Videos')},   destroy:()=>{}, onEnter:()=>{}, onLeave:()=>{}, cache:[] },
  { id:'ajustes', label:'Ajustes', emoji:'⚙️', desc:'Configuración',      color:'#6B7A99', orden:99, habilitado:true, requierePin:true,  init:async c=>{c.innerHTML=_ph('Ajustes')},  destroy:()=>{}, onEnter:()=>{}, onLeave:()=>{}, cache:[] },

].filter(m => m.habilitado).sort((a, b) => a.orden - b.orden);

/* 4. Renderizar menú */
MODULE_REGISTRY.forEach(mod => {
  const tile = document.createElement('button');
  tile.className = 'module-tile';
  tile.setAttribute('aria-label', mod.label);
  tile.dataset.id = mod.id;
  if (mod.requierePin) tile.dataset.requierePin = '1';
  tile.style.borderColor = `${mod.color}33`;
  tile.innerHTML = `
    <span class="tile-emoji">${mod.emoji}</span>
    <span class="tile-label">${mod.label}</span>
    ${mod.desc ? `<span class="tile-desc">${mod.desc}</span>` : ''}
  `;
  tile.addEventListener('click', () =>
    mod.requierePin ? abrirPin(mod) : navegarA(mod)
  );
  $('menu-grid').appendChild(tile);
});

/* 5. Navegación */
let _moduloActivo = null;

async function navegarA(mod) {
  $('vista-menu').style.display = 'none';
  $('vista-modulo').classList.add('activa');
  $('modulo-acciones').innerHTML = '';

  if (_moduloActivo && _moduloActivo.id !== mod.id) {
    try { _moduloActivo.onLeave?.(); _moduloActivo.destroy?.(); } catch (_) {}
  }
  _moduloActivo = mod;

  const contenedor = $('modulo-contenido');
  contenedor.innerHTML = '';
  try {
    await mod.init(contenedor);
    mod.onEnter?.();
    animarEntrada(contenedor);
  } catch (e) {
    console.error(`[App] Error en módulo "${mod.id}":`, e);
    contenedor.innerHTML = `<div style="padding:2rem;color:#ef4444;font-weight:600;">
      Error al cargar el módulo.</div>`;
  }
}

function volverAlMenu() {
  if (_moduloActivo) {
    try { _moduloActivo.onLeave?.(); _moduloActivo.destroy?.(); } catch (_) {}
    _moduloActivo = null;
  }
  $('vista-modulo').classList.remove('activa');
  $('modulo-acciones').innerHTML = '';
  $('modulo-contenido').innerHTML = '';
  $('vista-menu').style.display = '';
}

$('btn-volver').addEventListener('click', volverAlMenu);

/* 6. PIN */
let _pinTarget = null, _pinRespuesta = 0;

function abrirPin(mod) {
  _pinTarget = mod;
  const a = Math.floor(Math.random() * 9) + 1;
  const b = Math.floor(Math.random() * 9) + 1;
  _pinRespuesta = a + b;
  $('pin-hint').textContent  = `Resuelve: ${a} + ${b} = ?`;
  $('input-pin').value       = '';
  $('pin-error').textContent = '';
  $('modal-pin').classList.add('visible');
  setTimeout(() => $('input-pin').focus(), 100);
}

function cerrarPin() {
  $('modal-pin').classList.remove('visible');
  _pinTarget = null;
}

$('btn-pin-ok').addEventListener('click', () => {
  if (parseInt($('input-pin').value, 10) === _pinRespuesta) {
    cerrarPin(); navegarA(_pinTarget);
  } else {
    $('pin-error').textContent = 'Respuesta incorrecta, intenta de nuevo.';
    $('input-pin').value = ''; $('input-pin').focus();
  }
});
$('btn-pin-cancel').addEventListener('click', cerrarPin);
$('input-pin').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('btn-pin-ok').click();
});
$('modal-pin').addEventListener('click', e => {
  if (e.target === $('modal-pin')) cerrarPin();
});

/* 7. Atajo por URL */
const moduloUrl = new URLSearchParams(location.search).get('modulo');
if (moduloUrl) {
  const mod = MODULE_REGISTRY.find(m => m.id === moduloUrl);
  if (mod) navegarA(mod);
}

/* 8. API global para módulos */
window.DotirApp = { volverAlMenu, navegarA, toast, MODULE_REGISTRY };

</script>
</body>
</html>
